<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Juice Shop – Payment</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--c1:#ff6b6b;--c2:#ffd93d;--c3:#6bcb77;--c4:#4d96ff;--dark:#1a1a2e;--light:#f8f9fa;--gray:#6c757d;--font-h:'Syne',sans-serif;--font-b:'Nunito',sans-serif;--sh:0 4px 24px rgba(0,0,0,.1);--sh2:0 12px 40px rgba(0,0,0,.15);}
body{font-family:var(--font-b);background:var(--light);color:var(--dark);}
.nav{background:var(--dark);padding:16px 48px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:var(--font-h);font-size:1.6rem;color:#fff;text-decoration:none;}
.logo span{color:var(--c2);}
.nav-links{display:flex;gap:8px;}
.nav-link{color:rgba(255,255,255,.7);text-decoration:none;padding:8px 18px;border-radius:50px;font-weight:600;font-size:.88rem;transition:all .2s;}
.nav-link:hover,.nav-link.active{background:var(--c2);color:var(--dark);}
.page-wrap{max-width:500px;margin:0 auto;padding:56px 24px;}
.bill-card{background:#fff;border-radius:28px;padding:40px;box-shadow:var(--sh2);text-align:center;}
.bill-icon{font-size:3.5rem;margin-bottom:16px;display:block;}
.bill-card h1{font-family:var(--font-h);font-size:1.8rem;margin-bottom:6px;}
.bill-card h1 span{color:var(--c3);}
.amount-box{background:linear-gradient(135deg,var(--dark),#16213e);border-radius:18px;padding:24px;margin:24px 0;}
.amount-label{color:rgba(255,255,255,.6);font-size:.85rem;font-weight:600;margin-bottom:6px;}
.amount-value{font-family:var(--font-h);font-size:2.8rem;color:var(--c2);}
.qr-section{margin:24px 0;}
.qr-section p{color:var(--gray);font-size:.9rem;margin-bottom:16px;}
.qr-img{border-radius:16px;box-shadow:var(--sh);border:4px solid var(--light);}
.divider{border:none;border-top:2px dashed var(--light);margin:24px 0;}
.payment-methods{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:24px;}
.pm{background:var(--light);border-radius:10px;padding:8px 16px;font-size:.82rem;font-weight:700;}
.pay-btn{width:100%;background:linear-gradient(135deg,var(--c3),var(--c4));color:#fff;border:none;padding:16px;border-radius:50px;font-family:var(--font-b);font-weight:800;font-size:1rem;cursor:pointer;margin-bottom:12px;transition:all .3s;}
.pay-btn:hover{transform:translateY(-2px);}
.back-btn{width:100%;background:transparent;color:var(--gray);border:2px solid var(--light);padding:12px;border-radius:50px;font-family:var(--font-b);font-weight:700;font-size:.9rem;cursor:pointer;text-decoration:none;display:block;text-align:center;transition:all .2s;}
.back-btn:hover{border-color:var(--c1);color:var(--c1);}
.success-box{display:none;background:linear-gradient(135deg,#dcfce7,#d1fae5);border-radius:18px;padding:28px;text-align:center;margin-top:20px;}
.success-box.show{display:block;animation:pop .4s ease;}
@keyframes pop{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.success-box .check{font-size:3rem;display:block;margin-bottom:10px;}
.success-box h3{font-family:var(--font-h);color:#16a34a;font-size:1.3rem;}
.success-box p{color:#166534;font-size:.88rem;margin-top:6px;}
footer{background:var(--dark);color:#fff;text-align:center;padding:28px;margin-top:48px;}
footer p{font-size:.82rem;color:rgba(255,255,255,.4);}
@media(max-width:768px){.nav{padding:14px 20px;}.nav-links{display:none;}.page-wrap{padding:32px 16px;}}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="logo">🍹 Juice<span>Shop</span></a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="cart.html" class="nav-link active">Cart</a>
    <a href="contact.html" class="nav-link">Contact</a>
  </div>
</nav>
<div class="page-wrap">
  <div class="bill-card">
    <span class="bill-icon">🧾</span>
    <h1>Payment <span>Summary</span></h1>
    <div class="amount-box">
      <div class="amount-label">TOTAL AMOUNT</div>
      <div class="amount-value" id="totalAmount">₹<span th:text="${total}">0</span></div>
    </div>
    <div class="qr-section">
      <p>📱 Scan QR Code to Pay</p>
      <img class="qr-img" width="200" height="200"
        th:src="'https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl=pay+' + ${total}"
        id="qrImg"
        src="https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl=pay+100"
        alt="QR Code"/>
    </div>
    <hr class="divider"/>
    <p style="color:var(--gray);font-size:.85rem;margin-bottom:14px;">Accepted Payment Methods</p>
    <div class="payment-methods">
      <span class="pm">📱 GPay</span>
      <span class="pm">🔵 PhonePe</span>
      <span class="pm">🟠 Paytm</span>
      <span class="pm">🏦 UPI</span>
    </div>
    <button class="pay-btn" onclick="confirmPayment()">✅ Confirm Payment</button>
    <a th:href="@{/cart}" class="back-btn">← Back to Cart</a>
    <div class="success-box" id="successBox">
      <span class="check">🎉</span>
      <h3>Payment Successful!</h3>
      <p>Your fresh juices are being prepared. Delivered in 30 mins!</p>
    </div>
  </div>
</div>
<footer><p>Juice Shop © 2026 — Pure Freshness Delivered</p></footer>
<script>
const params=new URLSearchParams(window.location.search);
const total=params.get('total');
if(total){
  document.getElementById('totalAmount').innerHTML='₹'+total;
  document.getElementById('qrImg').src='https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl=pay+'+total;
}
function confirmPayment(){
  document.getElementById('successBox').classList.add('show');
  document.querySelector('.pay-btn').disabled=true;
  document.querySelector('.pay-btn').textContent='✅ Paid!';
  localStorage.removeItem('cart');
  setTimeout(()=>window.location.href='home.html',3000);
}
</script>
</body>
</html>
