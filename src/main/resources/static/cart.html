<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Juice Shop – Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--c1:#ff6b6b;--c2:#ffd93d;--c3:#6bcb77;--c4:#4d96ff;--c5:#ff922b;--dark:#1a1a2e;--light:#f8f9fa;--gray:#6c757d;--font-h:'Syne',sans-serif;--font-b:'Nunito',sans-serif;--sh:0 4px 24px rgba(0,0,0,.1);}
body{font-family:var(--font-b);background:var(--light);color:var(--dark);}
.nav{background:var(--dark);padding:16px 48px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:var(--font-h);font-size:1.6rem;color:#fff;text-decoration:none;}
.logo span{color:var(--c2);}
.nav-links{display:flex;gap:8px;}
.nav-link{color:rgba(255,255,255,.7);text-decoration:none;padding:8px 18px;border-radius:50px;font-weight:600;font-size:.88rem;transition:all .2s;}
.nav-link:hover,.nav-link.active{background:var(--c2);color:var(--dark);}
.page-wrap{max-width:1000px;margin:0 auto;padding:48px 24px;}
.page-title{font-family:var(--font-h);font-size:2rem;margin-bottom:8px;}
.page-title span{color:var(--c1);}
.page-sub{color:var(--gray);margin-bottom:36px;}
.cart-layout{display:grid;grid-template-columns:1fr 340px;gap:28px;}
.cart-box,.summary-box{background:#fff;border-radius:20px;padding:28px;box-shadow:var(--sh);}
.cart-box h3,.summary-box h3{font-family:var(--font-h);font-size:1.2rem;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;}
th{background:var(--dark);color:#fff;padding:12px 16px;text-align:left;font-size:.85rem;}
th:first-child{border-radius:10px 0 0 10px;}th:last-child{border-radius:0 10px 10px 0;}
td{padding:14px 16px;border-bottom:1px solid var(--light);font-size:.9rem;vertical-align:middle;}
tr:last-child td{border:none;}
.del-btn{background:linear-gradient(135deg,var(--c1),#ff522b);color:#fff;border:none;padding:7px 16px;border-radius:50px;cursor:pointer;font-weight:700;font-size:.8rem;}
.item-name{font-weight:700;}.item-price{font-weight:800;color:var(--c5);}
.empty-cart{text-align:center;padding:48px;color:var(--gray);}
.empty-cart .big{font-size:4rem;display:block;margin-bottom:12px;}
.spinner{width:36px;height:36px;border:4px solid #e5e7eb;border-top-color:var(--c1);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading{text-align:center;padding:40px;color:var(--gray);}
.summary-row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:.9rem;}
.summary-row.total{font-family:var(--font-h);font-size:1.2rem;border-top:2px dashed var(--light);padding-top:14px;margin-top:8px;}
.summary-row.total span:last-child{color:var(--c1);}
.checkout-btn{width:100%;background:linear-gradient(135deg,var(--c3),var(--c4));color:#fff;border:none;padding:16px;border-radius:50px;font-family:var(--font-b);font-weight:800;font-size:1rem;cursor:pointer;margin-top:20px;transition:all .3s;}
.checkout-btn:hover{transform:translateY(-2px);}
.continue-btn{width:100%;background:transparent;color:var(--dark);border:2px solid var(--light);padding:12px;border-radius:50px;font-family:var(--font-b);font-weight:700;font-size:.9rem;cursor:pointer;margin-top:10px;text-decoration:none;display:block;text-align:center;transition:all .2s;}
.continue-btn:hover{border-color:var(--c4);color:var(--c4);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:var(--c2);padding:12px 22px;border-radius:12px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
footer{background:var(--dark);color:#fff;text-align:center;padding:28px;margin-top:48px;}
footer p{font-size:.82rem;color:rgba(255,255,255,.4);}
@media(max-width:768px){.nav{padding:14px 20px;}.nav-links{display:none;}.cart-layout{grid-template-columns:1fr;}.page-wrap{padding:32px 16px;}}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="logo">🍹 Juice<span>Shop</span></a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="cart.html" class="nav-link active">Cart</a>
    <a href="contact.html" class="nav-link">Contact</a>
    
  </div>
</nav>
<div class="page-wrap">
  <h1 class="page-title">Your <span>Cart</span> 🛒</h1>
  <p class="page-sub">Review your items and checkout</p>
  <div class="cart-layout">
    <div class="cart-box">
      <h3>Cart Items</h3>
      <div id="cartContent"><div class="loading"><div class="spinner"></div>Loading from server...</div></div>
    </div>
    <div class="summary-box">
      <h3>Order Summary</h3>
      <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
      <div class="summary-row"><span>Delivery</span><span style="color:var(--c3)">FREE</span></div>
      <div class="summary-row total"><span>Total</span><span id="total">₹0</span></div>
      <button class="checkout-btn" onclick="checkout()">Proceed to Payment ✨</button>
      <a href="home.html" class="continue-btn">← Continue Shopping</a>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<footer><p>Juice Shop © 2026 — Pure Freshness Delivered</p></footer>
<script>
let allItems=[];
async function loadCart(){
  try{
    const res=await fetch("http://localhost:8080/drink");
    const data=await res.json();
    allItems=data;renderTable(data);
  }catch(err){
    const local=JSON.parse(localStorage.getItem('cart')||'[]');
    allItems=local.map((c,i)=>({id:i+1,name:c.name,price:c.price}));
    renderTable(allItems);
  }
}
function renderTable(data){
  const wrap=document.getElementById('cartContent');
  if(!data||data.length===0){wrap.innerHTML=`<div class="empty-cart"><span class="big">🧺</span><b>Cart is empty!</b></div>`;updateTotal([]);return;}
  let html=`<table><thead><tr><th>#</th><th>Juice Name</th><th>Price</th><th>Action</th></tr></thead><tbody>`;
  data.forEach((item,i)=>{html+=`<tr id="row-${item.id}"><td>${i+1}</td><td class="item-name">${item.name}</td><td class="item-price">₹${item.price}</td><td><button class="del-btn" onclick="deleteItem(${item.id},'row-${item.id}')">🗑 Remove</button></td></tr>`;});
  html+=`</tbody></table>`;wrap.innerHTML=html;updateTotal(data);
}
function updateTotal(data){
  const t=data.reduce((s,c)=>s+Number(c.price),0);
  document.getElementById('subtotal').textContent='₹'+t;
  document.getElementById('total').textContent='₹'+t;
}
async function deleteItem(id,rowId){
  try{await fetch("http://localhost:8080/drink/"+id,{method:"DELETE"});}catch(e){}
  document.getElementById(rowId)?.remove();
  allItems=allItems.filter(c=>c.id!==id);
  updateTotal(allItems);showToast('✅ Item removed!');
}
function checkout(){
  const total=allItems.reduce((s,c)=>s+Number(c.price),0);
  if(total===0){showToast('🧺 Cart is empty!');return;}
  window.location.href='bill.html?total='+total;
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
loadCart();
</script>
</body>
</html>
